# Docker Compose configuration for server deployments
# Used for development (preview), staging, and production environments on remote servers
# For local development, use docker-compose.yml instead

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      # Rails Configuration
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"

      # Generate this with: docker run --rm ruby:3.2.9 bundle exec rails secret
      # Or use: openssl rand -hex 64
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-placeholder_secret_key_base_change_me_in_production}

      # Database Configuration
      DATABASE_HOST: db
      DATABASE_NAME: ucnrs_rams_production
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      DATABASE_PORT: 3306

      # Puma Configuration
      WEB_CONCURRENCY: 2
      RAILS_MAX_THREADS: 5

      # Email Configuration (update with your settings)
      HOST: localhost:3000
      PROTOCOL: http
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-example.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-user@example.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-password}

      # AWS Configuration (if using S3 for file storage)
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_REGION: ${AWS_REGION:-us-west-2}
      # AWS_BUCKET: ${AWS_BUCKET}

    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount storage for local file uploads (use S3 in real production)
      - storage_data:/app/storage
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      MYSQL_DATABASE: ucnrs_rams_production
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DATABASE_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
  storage_data:

networks:
  app_network:
    driver: bridge

# Usage:
# 1. Create a .env.server file with required environment variables
# 2. Build and start: docker-compose -f docker-compose.server.yml up --build
# 3. Run migrations: docker-compose -f docker-compose.server.yml exec app bundle exec rails db:migrate
# 4. Create admin user: docker-compose -f docker-compose.server.yml exec app bundle exec rails console
# 5. Access app at http://localhost:3000

