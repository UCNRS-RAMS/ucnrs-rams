  activerecord: &errors
    attributes:
      visit:
        start_date: "start date"
        end_date: "end date"
      amenity_visit:
        arrives_on: "start date"
      project_team_membership_form:
        full_name: "Full Name"
        project_role: "Project Role"
    errors:
      messages:
        must_be_after: "must be after %{attribute}"
        must_select_at_least_one: "must select at least one"
        blank: "required"
      models:
        visit:
          attributes:
            start_date:
              must_be_before_user_visits_arrives_at: "must be before visitor arrival"
            end_date:
              must_be_after_user_visits_departs_at: "must be after visitor departure"
        amenity_visit:
          attributes:
            arrives:
              must_be_after_visit_start_date: "must be after visit start datetime"
            departs:
              must_be_before_visit_end_date: "must be before visit end datetime"
            arrives_on:
              must_be_after_visit_start_date: "must be after visit start datetime"
            departs_on:
              must_be_before_visit_end_date: "must be before visit end datetime"
            arrives_at:
              must_be_after_visit_start_date: "must be after visit start datetime"
            departs_at:
              must_be_before_visit_end_date: "must be before visit end datetime"
            number_of_people:
              greater_than: "must be a number greater than %{count}"
              not_a_number: "must be a number greater than 0"
        project:
          attributes:
            involvements:
              must_select_at_least_one: "required: must select at least one"
            discipline:
              blank: "must select one"
            method_remove_organisms:
              inclusion: "required"
            method_transfer_organisms:
              inclusion: "required"
            method_study_non_native_species:
              inclusion: "required"
            method_chemicals:
              inclusion: "required"
            method_soil_disturbance:
              inclusion: "required"
            method_long_term_structures:
              inclusion: "required"
        project_team_membership:
          attributes:
            user:
              required: "required"
              taken: "already on this team"
        project_team_membership_form:
          attributes:
            project_role:
              inclusion: "required"
        user:
          billing_address_fields_presence: "can't be blank if including a billing address"
          attributes:
            password:
              complexity: "Password complexity requirement not met. Length should be 8-70 characters and include: 1 uppercase character and 1 digit."
              confirmation: "does not match Password"
              too_short: "must be at least %{count} characters"
            address_state_id:
              must_be_in_country: "must exist as a state, province, or territory of the address country"
            billing_address_state_id:
              must_be_in_country: "must exist as a state, province, or territory of the billing address country"
        user_visit:
          attributes:
            arrives_at:
              must_be_after_visit_start_date: "must be after visit start date"
              must_be_before_visit_end_date: "must be before visit end date"
              dates_overlap: "overlapping date with existing dates"
            departs_at:
              dates_overlap: "overlapping date with existing dates"
              must_be_before_visit_end_date: "must be before visit end date"
